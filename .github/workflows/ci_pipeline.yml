name: CI Pipeline - ML Churn

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: ⚡ Instalar 'uv'
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: 📦 Instalar Dependências
      run: |
        export PATH="$HOME/.cargo/bin:$PATH"
        uv pip install --system -e ".[dev]"

    - name: 🧪 Rodar Pytest & QA
      run: |
        export PATH="$HOME/.cargo/bin:$PATH"
        pytest tests/ ml-churn-api/tests/ -v

# 5. Executa os testes automatizados gerando os relatórios
    - name: 🧪 Rodar Pytest & QA
      run: |
        export PATH="$HOME/.cargo/bin:$PATH"
        # Criamos a pasta e rodamos o pytest com saída para HTML
        mkdir -p tests/docs
        pytest tests/ ml-churn-api/tests/ -v --html=tests/docs/relatorio_qa.html --self-contained-html

    # 6. Salva o Relatório como um Artefato no GitHub
    - name: 💾 Salvar Relatório HTML
      uses: actions/upload-artifact@v4
      if: always() # Garante que vai salvar o HTML mesmo se algum teste falhar!
      with:
        name: relatorio-qa-testes
        path: tests/docs/relatorio_qa.html
        retention-days: 30 # Mantém o arquivo salvo por 30 dias